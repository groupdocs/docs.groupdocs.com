# Publish documentation site to production or QA
name: publish-site

on:
  # Auto-publish the home page to QA whenever content/_index.md is committed to master.
  # This runs a "home only" build (no product docs) and deploys to the QA environment.
  push:
    branches:
      - master
    paths:
      - 'content/_index.md'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options:
          - prod
          - qa
        default: 'qa'
      home:
        description: 'Home (this repository)'
        type: boolean
        default: true
      all_products:
        description: 'All products (overrides individual selections below)'
        type: boolean
        default: false
      annotation:
        description: 'Annotation'
        type: boolean
        default: false
      assembly:
        description: 'Assembly'
        type: boolean
        default: false
      classification:
        description: 'Classification'
        type: boolean
        default: false
      comparison:
        description: 'Comparison'
        type: boolean
        default: false
      conversion:
        description: 'Conversion'
        type: boolean
        default: false
      editor:
        description: 'Editor'
        type: boolean
        default: false
      markdown:
        description: 'Markdown'
        type: boolean
        default: false
      merger:
        description: 'Merger'
        type: boolean
        default: false
      metadata:
        description: 'Metadata'
        type: boolean
        default: false
      parser:
        description: 'Parser'
        type: boolean
        default: false
      redaction:
        description: 'Redaction'
        type: boolean
        default: false
      search:
        description: 'Search'
        type: boolean
        default: false
      signature:
        description: 'Signature'
        type: boolean
        default: false
      total:
        description: 'Total'
        type: boolean
        default: false
      viewer:
        description: 'Viewer'
        type: boolean
        default: false
      watermark:
        description: 'Watermark'
        type: boolean
        default: false

jobs:
  publish:
    uses: ./.github/workflows/_reusable-build-deploy.yml
    with:
      # QA for push events and manual qa runs; prod (config default base URL) only for manual prod runs.
      base_url:        ${{ (github.event_name == 'push' || inputs.environment == 'qa') && 'https://docs-qa.groupdocs.com/' || '' }}
      # Push events publish home only, so every product flag is forced false; manual runs honor their inputs.
      all_products:    ${{ github.event_name == 'workflow_dispatch' && inputs.all_products   || false }}
      annotation:      ${{ github.event_name == 'workflow_dispatch' && inputs.annotation     || false }}
      assembly:        ${{ github.event_name == 'workflow_dispatch' && inputs.assembly       || false }}
      classification:  ${{ github.event_name == 'workflow_dispatch' && inputs.classification || false }}
      comparison:      ${{ github.event_name == 'workflow_dispatch' && inputs.comparison     || false }}
      conversion:      ${{ github.event_name == 'workflow_dispatch' && inputs.conversion     || false }}
      editor:          ${{ github.event_name == 'workflow_dispatch' && inputs.editor         || false }}
      markdown:        ${{ github.event_name == 'workflow_dispatch' && inputs.markdown       || false }}
      merger:          ${{ github.event_name == 'workflow_dispatch' && inputs.merger         || false }}
      metadata:        ${{ github.event_name == 'workflow_dispatch' && inputs.metadata       || false }}
      parser:          ${{ github.event_name == 'workflow_dispatch' && inputs.parser         || false }}
      redaction:       ${{ github.event_name == 'workflow_dispatch' && inputs.redaction      || false }}
      search:          ${{ github.event_name == 'workflow_dispatch' && inputs.search         || false }}
      signature:       ${{ github.event_name == 'workflow_dispatch' && inputs.signature      || false }}
      total:           ${{ github.event_name == 'workflow_dispatch' && inputs.total          || false }}
      viewer:          ${{ github.event_name == 'workflow_dispatch' && inputs.viewer         || false }}
      watermark:       ${{ github.event_name == 'workflow_dispatch' && inputs.watermark      || false }}
    secrets:
      DOCS_SSH_HOST:   ${{ secrets.DOCS_SSH_HOST }}
      DEPLOY_SSH_DIR:  ${{ (github.event_name == 'push' || inputs.environment == 'qa') && secrets.DOCS_QA_SSH_DIR || secrets.DOCS_SSH_DIR }}
      DOCS_SSH_USER:   ${{ secrets.DOCS_SSH_USER }}
      DOCS_SSH_KEY:    ${{ secrets.DOCS_SSH_KEY }}
