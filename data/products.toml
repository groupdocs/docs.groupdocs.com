# Home page product grid — single source of truth.
# Rendered by layouts/shortcodes/products-grid.html via {{< products-grid >}} in content/_index.md.
# To add a product: append a [[product]] block (and ensure /img/groupdocs-stack.svg has a matching
# <symbol id="{icon}">). Order on the page follows `weight` ascending.
#
# Fields:
#   key         product family key (matches the content section / sprite icon, informational)
#   title       card heading
#   url         family landing page (links to {url}/{platform} for each platform button)
#   icon        <symbol id> in /img/groupdocs-stack.svg (note: search uses "search-app")
#   weight      display order (ascending)
#   description card blurb
#   platforms   subset/order of: net, java, nodejs-java, python-net

